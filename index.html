<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ONE THING</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f; --surf:#13131a; --surf2:#1c1c26; --bord:#2a2a38;
  --t1:#4a7fff;
  --t1-glow:rgba(74,127,255,.18);
  --t1-soft:rgba(74,127,255,.08);
  --gold:#d4a574;
  --t2:#7c6aff;
  --t2-soft:rgba(124,106,255,.1);
  --evt:#6affe0;
  --evt-soft:rgba(106,255,224,.08);
  --t3:#8888aa;
  --t3-soft:rgba(136,136,170,.08);
  --txt:#e8e8f0; --txt2:#8888aa; --txt3:#555570;
  --warn:#ff7070; --done:#3a3a50;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
.app{max-width:440px;margin:0 auto;padding:0 0 90px;position:relative}

.hdr{padding:18px 18px 0;display:flex;justify-content:space-between;align-items:center}
.hdr-date{font-family:'Space Mono',monospace;font-size:11px;color:var(--txt3);letter-spacing:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:11px;color:var(--t1);font-weight:700;letter-spacing:2px}
.sync-indicator{width:7px;height:7px;border-radius:50%;background:var(--txt3);transition:background .3s}
.sync-indicator.syncing{background:#ffa500;animation:pulse-sync .8s infinite}
.sync-indicator.ok{background:var(--evt)}
.sync-indicator.err{background:var(--warn)}
@keyframes pulse-sync{0%,100%{opacity:1}50%{opacity:.3}}

.context-line{padding:14px 18px 0;font-family:'Space Mono',monospace;font-size:10px;color:var(--txt3);line-height:1.6}
.ctx-arrow{color:var(--txt3);opacity:.5;margin:0 4px}
.ctx-here{color:var(--t1);font-weight:700}

section{padding:0 16px;margin-top:18px}

.ot-mega{margin:14px 16px 0;background:linear-gradient(155deg,rgba(74,127,255,.15) 0%,rgba(74,127,255,.04) 60%,transparent 100%);
  border:1.5px solid rgba(74,127,255,.45);border-radius:24px;padding:26px 22px;position:relative;overflow:hidden;transition:all .35s}
.ot-mega::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,var(--t1-glow),transparent 50%);pointer-events:none;transition:opacity .4s}
.ot-mega.empty{border-color:rgba(74,127,255,.2);background:rgba(74,127,255,.03)}
.ot-mega.empty::before{opacity:.3}
.ot-mega.checked{background:linear-gradient(155deg,rgba(212,165,116,.12) 0%,rgba(212,165,116,.03) 60%,transparent 100%);border-color:rgba(212,165,116,.4)}
.ot-mega.checked::before{background:radial-gradient(circle at 80% 20%,rgba(212,165,116,.18),transparent 50%)}
.ot-tag{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--t1);font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ot-mega.checked .ot-tag{color:var(--gold)}
.ot-tag-dot{width:6px;height:6px;border-radius:50%;background:var(--t1);box-shadow:0 0 8px var(--t1)}
.ot-mega.checked .ot-tag-dot{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.ot-mega-text{font-size:26px;font-weight:700;line-height:1.35;color:var(--txt);cursor:pointer;letter-spacing:-.3px;min-height:36px;word-break:keep-all}
.ot-mega-text.ph{color:var(--txt3);font-weight:400;font-size:18px;line-height:1.5}
.ot-mega.checked .ot-mega-text{color:var(--gold)}
.ot-mega-inp{display:none;width:100%;background:rgba(0,0,0,.3);border:1px solid rgba(74,127,255,.4);border-radius:12px;color:var(--txt);font-family:'Noto Sans KR',sans-serif;font-size:22px;font-weight:700;padding:12px 14px;outline:none;resize:none;line-height:1.4}
.ot-mega-inp:focus{border-color:var(--t1)}
.ot-mega-actions{margin-top:18px;display:flex;gap:8px;align-items:center}
.ot-check-btn{padding:10px 20px;background:rgba(74,127,255,.15);border:1.5px solid rgba(74,127,255,.4);border-radius:12px;color:var(--t1);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.ot-mega.checked .ot-check-btn{background:rgba(212,165,116,.15);border-color:rgba(212,165,116,.4);color:var(--gold)}
.ot-edit-btn{padding:10px 14px;background:transparent;border:1px solid var(--bord);border-radius:12px;color:var(--txt2);font-size:12px;cursor:pointer}
.ot-edit-btn:hover{border-color:var(--t2);color:var(--t2)}
@keyframes ot-breathe{0%,100%{box-shadow:0 0 0 0 var(--t1-glow)}50%{box-shadow:0 0 0 14px transparent}}
.ot-mega:not(.empty):not(.checked){animation:ot-breathe 4s infinite}

.below-ot{transition:opacity .4s,filter .4s}
.below-ot.dim{opacity:.35;filter:blur(.5px) saturate(.5)}

.goals-mini{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.goal-mini{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:10px 12px;cursor:pointer;position:relative;overflow:hidden}
.goal-mini::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px}
.goal-mini.monthly::before{background:var(--t1);opacity:.4}
.goal-mini.weekly::before{background:var(--t2);opacity:.5}
.goal-mini-lbl{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1.5px;color:var(--txt3);margin-bottom:4px}
.goal-mini.monthly .goal-mini-lbl{color:var(--t1);opacity:.8}
.goal-mini.weekly .goal-mini-lbl{color:var(--t2);opacity:.8}
.goal-mini-txt{font-size:12px;font-weight:500;line-height:1.35;color:var(--txt);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:keep-all}
.goal-mini-txt.ph{color:var(--txt3);font-weight:400;font-size:11px}
.goal-mini-inp{display:none;width:100%;background:var(--surf2);border:1px solid var(--bord);border-radius:6px;color:var(--txt);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:5px 7px;outline:none;resize:none}
.goal-mini-prog{display:flex;align-items:center;gap:6px;margin-top:7px}
.goal-mini-bar{flex:1;height:2px;background:var(--bord);border-radius:1px;overflow:hidden}
.goal-mini-fill{height:100%;border-radius:1px}
.goal-mini.monthly .goal-mini-fill{background:var(--t1)}
.goal-mini.weekly .goal-mini-fill{background:var(--t2)}
.goal-mini-meta{font-family:'Space Mono',monospace;font-size:8px;color:var(--txt3)}
.weekly-mini-check{width:18px;height:18px;border-radius:5px;border:1.5px solid rgba(124,106,255,.4);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:transparent;transition:all .2s}
.weekly-mini-check.done{background:var(--t2);border-color:var(--t2);color:#fff}

.stats-row{display:flex;gap:6px}
.stat-card{flex:1;background:transparent;border:1px solid var(--bord);border-radius:10px;padding:8px 6px;text-align:center}
.stat-num{font-family:'Space Mono',monospace;font-size:15px;font-weight:500;line-height:1;color:var(--txt2)}
.stat-lbl{font-size:9px;color:var(--txt3);opacity:.7;margin-top:3px}

.cat-section{margin-top:18px;padding:0 16px}
.cat-block{background:var(--surf);border:1px solid var(--bord);border-radius:14px;overflow:hidden;margin-bottom:8px}
.cat-block.t2{border-color:rgba(124,106,255,.2)}
.cat-block.evt{border-color:rgba(106,255,224,.18)}
.cat-block.t3{opacity:.85}
.cat-head{padding:11px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-block.t2 .cat-dot{background:var(--t2)}
.cat-block.evt .cat-dot{background:var(--evt)}
.cat-block.t3 .cat-dot{background:var(--t3)}
.cat-head-name{font-size:13px;font-weight:700;letter-spacing:.3px}
.cat-block.t3 .cat-head-name{color:var(--txt2);font-weight:500}
.cat-head-count{font-family:'Space Mono',monospace;font-size:10px;color:var(--txt3);margin-left:auto}
.cat-arrow{font-size:11px;color:var(--txt3);transition:transform .2s}
.cat-block.collapsed .cat-arrow{transform:rotate(-90deg)}
.cat-progress{height:2px;background:transparent;margin:0 14px}
.cat-progress-fill{height:100%;border-radius:1px;transition:width .3s}
.cat-block.t2 .cat-progress-fill{background:var(--t2)}
.cat-block.evt .cat-progress-fill{background:var(--evt)}
.cat-body{padding:4px 8px 10px}
.cat-block.collapsed .cat-body{display:none}
.cat-block.collapsed .cat-progress{display:none}
.cat-empty{padding:10px 8px 6px;font-size:11px;color:var(--txt3);text-align:center}

.item{display:flex;align-items:flex-start;gap:8px;padding:9px 8px;border-radius:9px;transition:background .15s;cursor:pointer}
.item:hover{background:rgba(255,255,255,.02)}
.item.done{opacity:.4}
.item-time{font-family:'Space Mono',monospace;font-size:11px;color:var(--evt);min-width:42px;padding-top:1px;font-weight:700;flex-shrink:0}
.item-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bord);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.item.t2 .item-check{border-color:rgba(124,106,255,.5)}
.item.evt .item-check{border-color:rgba(106,255,224,.4)}
.item.done .item-check{background:var(--done);border-color:var(--done)}
.item-check .chk{display:none;font-size:10px;color:var(--txt2);font-weight:700}
.item.done .item-check .chk{display:block}
.item-body{flex:1;min-width:0}
.item-text{font-size:13px;line-height:1.4;color:var(--txt);font-weight:500;word-break:break-word}
.item.t3 .item-text{font-size:12px;color:var(--txt2);font-weight:400}
.item.done .item-text{text-decoration:line-through;color:var(--txt3)}
.item-meta{display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;align-items:center}
.item-badge{font-family:'Space Mono',monospace;font-size:8.5px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,.04);color:var(--txt3)}
.item-badge.repeat{color:var(--t2)}
.item-badge.due{color:var(--warn)}
.item-badge.due.today{background:rgba(255,112,112,.15)}
.item-badge.carried{color:var(--warn);opacity:.7}
.item-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex-shrink:0}
.item:hover .item-actions{opacity:1}
.item-act{background:none;border:none;color:var(--txt3);font-size:12px;cursor:pointer;padding:2px 5px;border-radius:4px}
.item-act:hover{color:var(--t2);background:rgba(255,255,255,.04)}
.item-act.del:hover{color:var(--warn)}

.add-btn-row{padding:6px 8px 4px}
.add-mini-btn{width:100%;padding:8px;background:transparent;border:1px dashed var(--bord);border-radius:8px;color:var(--txt3);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.add-mini-btn:hover{border-color:var(--t2);color:var(--t2)}
.cat-block.t3 .add-mini-btn:hover{border-color:var(--t3);color:var(--txt2)}
.cat-block.evt .add-mini-btn:hover{border-color:var(--evt);color:var(--evt)}

.add-form{background:var(--surf2);border:1px solid var(--bord);border-radius:10px;padding:10px;margin:4px 8px;display:none;flex-direction:column;gap:8px}
.add-form.open{display:flex}
.add-form-row{display:flex;gap:6px;align-items:center}
.add-form input,.add-form select{background:var(--surf);border:1px solid var(--bord);border-radius:7px;color:var(--txt);font-family:'Noto Sans KR',sans-serif;font-size:12px;padding:7px 9px;outline:none;flex:1}
.add-form input[type=time]{flex:0 0 90px;font-family:'Space Mono',monospace}
.add-form input:focus,.add-form select:focus{border-color:var(--t2)}
.add-form-row label{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);min-width:30px}
.add-form-submit{background:var(--t2);border:none;border-radius:7px;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.add-form-submit.evt{background:var(--evt);color:#0a0a0f}
.add-form-submit.t3{background:var(--t3);color:#fff}

.repeat-row{display:flex;gap:4px;flex-wrap:wrap}
.rep-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--bord);background:transparent;font-size:10px;color:var(--txt3);cursor:pointer;font-family:'Space Mono',monospace}
.rep-btn.on{background:rgba(124,106,255,.18);border-color:var(--t2);color:var(--t2)}
.weekday-row{display:flex;gap:3px;margin-top:4px}
.wd-btn{flex:1;padding:5px;border-radius:5px;border:1px solid var(--bord);background:transparent;font-size:10px;color:var(--txt3);cursor:pointer;font-family:'Space Mono',monospace}
.wd-btn.on{background:rgba(124,106,255,.18);border-color:var(--t2);color:var(--t2)}

.habits-footer{padding:12px 18px;margin-top:8px;border-top:1px dashed var(--bord)}
.habit-row{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:11px}
.habit-name-mini{flex:0 0 auto;color:var(--txt2);min-width:50px;font-weight:500}
.habit-dots-mini{display:flex;gap:3px;flex:1}
.hd{width:6px;height:6px;border-radius:50%;background:var(--bord)}
.hd.on{background:var(--evt)}
.hd.today{box-shadow:0 0 0 1.5px var(--evt)}
.habit-streak-mini{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);min-width:40px;text-align:right}
.habit-streak-mini.active{color:var(--evt)}
.habit-check-mini{width:18px;height:18px;border-radius:4px;border:1px solid var(--bord);background:transparent;cursor:pointer;font-size:10px;color:transparent;transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.habit-check-mini.done{background:var(--evt);border-color:var(--evt);color:#0a0a0f}
.habit-add-mini{width:100%;margin-top:6px;padding:6px;background:transparent;border:1px dashed var(--bord);border-radius:6px;color:var(--txt3);font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
.habit-add-mini:hover{color:var(--evt);border-color:var(--evt)}
.habit-del-mini{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:11px;opacity:0;padding:0 2px}
.habit-row:hover .habit-del-mini{opacity:.6}

.cat-mgr{margin-top:10px;padding:8px 10px;background:var(--surf2);border:1px solid var(--bord);border-radius:10px;display:none}
.cat-mgr.open{display:block}
.cat-mgr-row{display:flex;gap:6px;align-items:center;padding:5px 0}
.cat-mgr-name{flex:1;font-size:12px;color:var(--txt2)}
.cat-mgr-del{background:none;border:none;color:var(--txt3);cursor:pointer;font-size:14px;padding:2px 6px}
.cat-mgr-del:hover{color:var(--warn)}
.cat-mgr-add{display:flex;gap:6px;margin-top:6px}
.cat-mgr-add input{flex:1;background:var(--surf);border:1px solid var(--bord);border-radius:6px;color:var(--txt);font-size:11px;padding:6px 9px;outline:none}
.cat-mgr-add select{background:var(--surf);border:1px solid var(--bord);border-radius:6px;color:var(--txt);font-size:11px;padding:6px 4px;outline:none}
.cat-mgr-add button{background:var(--t2);border:none;border-radius:6px;color:#fff;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer}

.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.97);border-top:1px solid var(--bord);backdrop-filter:blur(12px);display:flex;justify-content:space-around;padding:9px 0 18px;z-index:100;max-width:440px;margin:0 auto}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 14px;color:var(--txt3);transition:color .15s}
.nav-btn.active{color:var(--t1)}
.nav-icon{font-size:15px}
.nav-lbl{font-size:9px;font-family:'Space Mono',monospace;letter-spacing:1px}

.view{display:none}
.view.on{display:block}

.wk-head{padding:14px 14px 6px;display:flex;align-items:center;justify-content:space-between}
.wk-title{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--txt3)}
.wk-nav{display:flex;gap:6px}
.wk-nav-btn{background:var(--surf);border:1px solid var(--bord);color:var(--txt2);padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer}
.wk-grid-wrap{padding:0 8px}
.wk-day-headers{display:grid;grid-template-columns:36px repeat(7,1fr);gap:2px;background:var(--bg);padding:6px 0}
.wk-day-h{text-align:center;padding:4px 0;cursor:pointer;border-radius:6px}
.wk-day-h.today{background:var(--t1-soft)}
.wk-day-h.sel{background:var(--t1);color:#fff}
.wk-day-h .wd-name{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3)}
.wk-day-h.today .wd-name{color:var(--t1)}
.wk-day-h.sel .wd-name{color:#fff}
.wk-day-h .wd-num{font-size:13px;font-weight:700;margin-top:2px;color:var(--txt)}
.wk-day-h.sel .wd-num{color:#fff}
.wk-grid{display:grid;grid-template-columns:36px repeat(7,1fr);gap:2px;position:relative}
.wk-time-col{display:flex;flex-direction:column}
.wk-time-cell{height:38px;font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);text-align:right;padding-right:5px;padding-top:2px}
.wk-day-col{position:relative;min-height:684px;border-left:1px solid var(--bord)}
.wk-day-col.today{background:var(--t1-soft)}
.wk-hour-line{height:38px;border-top:1px solid var(--bord)}
.wk-hour-line:first-child{border-top:none}
.wk-event{position:absolute;left:2px;right:2px;background:var(--evt-soft);border-left:2px solid var(--evt);border-radius:5px;padding:2px 4px;font-size:9px;color:var(--evt);overflow:hidden;cursor:pointer;z-index:2}
.wk-event.t2{background:var(--t2-soft);border-left-color:var(--t2);color:var(--t2)}
.wk-event.t3{background:var(--t3-soft);border-left-color:var(--t3);color:var(--txt2)}
.wk-event-time{font-family:'Space Mono',monospace;font-size:8px;opacity:.8}
.wk-event-title{font-weight:600;line-height:1.2}
.wk-now-line{position:absolute;left:0;right:0;height:1.5px;background:var(--warn);z-index:3;pointer-events:none}
.wk-now-line::before{content:'';position:absolute;left:-3px;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--warn)}
.wk-day-tasks{margin-top:14px;padding:0 14px}
.wk-day-tasks-title{font-family:'Space Mono',monospace;font-size:10px;color:var(--txt3);letter-spacing:1.5px;margin-bottom:8px}
.wk-task-item{padding:7px 10px;background:var(--surf);border:1px solid var(--bord);border-radius:8px;margin-bottom:4px;font-size:12px;display:flex;align-items:center;gap:8px}
.wk-task-item .wk-task-cat{font-size:9px;color:var(--txt3)}
.wk-task-item.done{opacity:.4;text-decoration:line-through}

.history-item{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.history-period{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);margin-bottom:6px;display:flex;justify-content:space-between}
.history-badge{font-size:9px;padding:2px 8px;border-radius:99px}
.history-badge.yes{background:rgba(106,255,224,.15);color:var(--evt);border:1px solid rgba(106,255,224,.3)}
.history-badge.no{background:rgba(255,112,112,.1);color:var(--warn);border:1px solid rgba(255,112,112,.2)}
.history-type{font-size:9px;font-family:'Space Mono',monospace;margin-bottom:4px}
.history-type.monthly{color:var(--t1)}
.history-type.weekly{color:var(--t2)}
.history-goal{font-size:13px;font-weight:600;margin-bottom:3px;line-height:1.4}
.history-stat{font-size:10px;color:var(--txt3)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:999;opacity:0;pointer-events:none;transition:opacity .2s;padding:24px}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-box{background:#1a1a2e;border:1px solid #38384f;border-radius:18px;padding:24px 18px 16px;width:100%;max-width:300px;transform:scale(.93);transition:transform .25s cubic-bezier(.32,.72,0,1)}
.modal-overlay.open .modal-box{transform:scale(1)}
.modal-emoji{font-size:34px;text-align:center;margin-bottom:10px}
.modal-title{font-size:15px;font-weight:700;text-align:center;margin-bottom:6px;line-height:1.4}
.modal-sub{font-size:12px;color:#9090b8;text-align:center;margin-bottom:18px;line-height:1.6;white-space:pre-line}
.modal-btns{display:flex;gap:8px}
.modal-btn{flex:1;padding:13px 10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif}
.modal-btn.no{background:#3a3a55;color:#e0e0f0}
.modal-btn.yes{background:var(--t1);color:#fff}
.modal-btn.yes-gold{background:var(--gold);color:#1a0e05}
.modal-btn.yes-red{background:var(--warn);color:#fff}
.modal-inp-field{width:100%;background:#0e0e1a;border:1px solid #38384f;border-radius:9px;color:#e8e8f0;font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:10px 12px;outline:none;resize:none;margin-bottom:14px}
.modal-inp-field:focus{border-color:var(--t1)}

.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(8px);background:#1c1c2e;border:1px solid var(--t1);color:var(--txt);padding:8px 16px;border-radius:99px;font-size:11px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:1000}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px}
.loading-screen.hide{display:none}
.loading-dot{width:8px;height:8px;border-radius:50%;background:var(--t1);animation:ldot .8s ease-in-out infinite}
@keyframes ldot{0%,100%{transform:scale(.5);opacity:.3}50%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div style="color:var(--t1);font-family:'Space Mono',monospace;font-size:12px;letter-spacing:3px">ONE THING</div>
  <div class="loading-dot"></div>
</div>

<div class="app">
  <div class="hdr">
    <div class="hdr-date" id="hdr-date"></div>
    <div class="hdr-right">
      <div class="sync-indicator" id="sync-dot"></div>
      <div class="hdr-title">ONE THING</div>
    </div>
  </div>

  <div class="view on" id="view-today">
    <div class="context-line" id="context-line"></div>

    <div class="ot-mega empty" id="ot-mega">
      <div class="ot-tag"><div class="ot-tag-dot"></div> ONE THING · TODAY</div>
      <div class="ot-mega-text ph" id="ot-disp" onclick="focusOT()">오늘의 단 하나를 정해주세요</div>
      <textarea class="ot-mega-inp" id="ot-inp" rows="2" placeholder="오늘 무조건 끝낼 단 하나..."></textarea>
      <div class="ot-mega-actions" id="ot-actions" style="display:none">
        <button class="ot-check-btn" id="ot-check-btn" onclick="openOTModal()">○ 달성</button>
        <button class="ot-edit-btn" onclick="focusOT()">수정</button>
      </div>
    </div>

    <div class="below-ot dim" id="below-ot">
      <section style="margin-top:14px">
        <div class="goals-mini">
          <div class="goal-mini monthly">
            <div class="goal-mini-lbl">MONTHLY</div>
            <div class="goal-mini-txt ph" id="monthly-disp" onclick="focusGoal('monthly')">이번 달 원씽</div>
            <textarea class="goal-mini-inp" id="monthly-inp" rows="2"></textarea>
            <div class="goal-mini-prog">
              <div class="goal-mini-bar"><div class="goal-mini-fill" id="monthly-fill" style="width:0%"></div></div>
              <div class="goal-mini-meta" id="monthly-meta">0/0</div>
            </div>
          </div>
          <div class="goal-mini weekly">
            <div class="goal-mini-lbl" style="display:flex;align-items:center;gap:6px">
              WEEKLY
              <div class="weekly-mini-check" id="weekly-mini-check" onclick="event.stopPropagation();toggleWeeklyGoal()">✓</div>
            </div>
            <div class="goal-mini-txt ph" id="weekly-disp" onclick="focusGoal('weekly')">이번 주 원씽</div>
            <textarea class="goal-mini-inp" id="weekly-inp" rows="2"></textarea>
            <div class="goal-mini-prog">
              <div class="goal-mini-bar"><div class="goal-mini-fill" id="weekly-fill" style="width:0%"></div></div>
              <div class="goal-mini-meta" id="weekly-meta">0/7일</div>
            </div>
          </div>
        </div>
      </section>

      <section>
        <div class="stats-row">
          <div class="stat-card"><div class="stat-num" id="s-done">0</div><div class="stat-lbl">완료</div></div>
          <div class="stat-card"><div class="stat-num" id="s-left">0</div><div class="stat-lbl">남은것</div></div>
          <div class="stat-card"><div class="stat-num" id="s-evt">0</div><div class="stat-lbl">일정</div></div>
        </div>
      </section>

      <div class="cat-section" id="cat-section"></div>

      <section style="margin-top:14px">
        <button class="add-mini-btn" onclick="toggleCatMgr()" style="border-style:solid">⚙ 카테고리 관리</button>
        <div class="cat-mgr" id="cat-mgr"></div>
      </section>

      <div class="habits-footer" id="habits-footer"></div>
    </div>
  </div>

  <div class="view" id="view-weekly">
    <div class="wk-head">
      <div class="wk-title" id="wk-title">이번 주</div>
      <div class="wk-nav">
        <button class="wk-nav-btn" onclick="navWeek(-1)">◀</button>
        <button class="wk-nav-btn" onclick="navWeek(0)">오늘</button>
        <button class="wk-nav-btn" onclick="navWeek(1)">▶</button>
      </div>
    </div>
    <div class="wk-grid-wrap">
      <div class="wk-day-headers" id="wk-day-headers"></div>
      <div class="wk-grid" id="wk-grid"></div>
    </div>
    <div class="wk-day-tasks">
      <div class="wk-day-tasks-title" id="wk-tasks-title">오늘 할 일</div>
      <div id="wk-tasks-list"></div>
    </div>
  </div>

  <div class="view" id="view-history">
    <section><div style="font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--txt3);margin-bottom:10px">HISTORY</div><div id="history-list"></div></section>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" id="nav-today" onclick="sw('today')"><div class="nav-icon">⚡</div><div class="nav-lbl">TODAY</div></button>
  <button class="nav-btn" id="nav-weekly" onclick="sw('weekly')"><div class="nav-icon">📅</div><div class="nav-lbl">WEEK</div></button>
  <button class="nav-btn" id="nav-history" onclick="sw('history')"><div class="nav-icon">📋</div><div class="nav-lbl">HISTORY</div></button>
</div>

<div class="modal-overlay" id="ot-modal"><div class="modal-box">
  <div class="modal-emoji" id="ot-emoji">⚡</div>
  <div class="modal-title" id="ot-title"></div>
  <div class="modal-sub" id="ot-sub"></div>
  <div class="modal-btns">
    <button class="modal-btn no" id="ot-no-btn" onclick="closeModal('ot-modal')">아직요</button>
    <button class="modal-btn yes" id="ot-yes-btn" onclick="confirmOT()">달성했어요</button>
  </div>
</div></div>

<div class="modal-overlay" id="new-goal-modal"><div class="modal-box">
  <div class="modal-emoji">🎯</div>
  <div class="modal-title" id="new-goal-title"></div>
  <div class="modal-sub" id="new-goal-sub"></div>
  <textarea class="modal-inp-field" id="new-goal-inp" rows="2" placeholder="새 원씽..."></textarea>
  <div class="modal-btns">
    <button class="modal-btn no" onclick="closeModal('new-goal-modal')">나중에</button>
    <button class="modal-btn yes" onclick="saveNewGoal()">저장</button>
  </div>
</div></div>

<div class="modal-overlay" id="confirm-modal"><div class="modal-box">
  <div class="modal-emoji" id="cf-emoji">⚠</div>
  <div class="modal-title" id="cf-title"></div>
  <div class="modal-sub" id="cf-sub"></div>
  <div class="modal-btns">
    <button class="modal-btn no" onclick="closeModal('confirm-modal')">취소</button>
    <button class="modal-btn yes-red" id="cf-yes-btn">삭제</button>
  </div>
</div></div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAMDtShcAR0j6RyNxZCb0UNAligpQFHb0A",
  authDomain: "jaeonething.firebaseapp.com",
  projectId: "jaeonething",
  storageBucket: "jaeonething.firebasestorage.app",
  messagingSenderId: "214001610486",
  appId: "1:214001610486:web:05b60184be1133e1a886d7"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const docRef = doc(db, 'onething', 'jaewon');

const DAYS=['일','월','화','수','목','금','토'];
const WD_SHORT=['일','월','화','수','목','금','토'];

let S = {
  goals:{monthly:'',weekly:'',onething:'',otDone:false,otLastDate:''},
  todos:{}, events:{}, habits:[],
  otLog:{}, weeklyDoneLog:{}, history:[],
  cats:[
    {name:'삼남래',tier:'t2',emoji:'🎯'},
    {name:'일정',tier:'evt',emoji:'📅'},
    {name:'개인',tier:'t3',emoji:'🗂'}
  ],
  collapsed:{},
  recurring:{tasks:[],events:[]},
  lastWeekKey:'', lastMonthKey:'', lastCarryDate:'', lastRepeatDate:''
};

let isSaving=false, pendingSave=false;
let wkOffset=0, wkSelDay=null;
const _addState={};

function z(n){return String(n).padStart(2,'0')}
function todayKey(d){d=d||new Date();return`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`}
function weekStart(d){d=d||new Date();const dow=d.getDay(),m=new Date(d);m.setDate(d.getDate()-(dow===0?6:dow-1));m.setHours(0,0,0,0);return m}
function thisWeekKey(){return todayKey(weekStart())}
function thisMonthKey(){const d=new Date();return`${d.getFullYear()}-${z(d.getMonth()+1)}`}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(window.__t);window.__t=setTimeout(()=>t.classList.remove('show'),1800)}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function setSync(s){document.getElementById('sync-dot').className='sync-indicator '+s}
function escapeHtml(s){return(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}

async function save(){
  try{localStorage.setItem('onesys_v2',JSON.stringify(S))}catch(e){}
  if(isSaving){pendingSave=true;return}
  isSaving=true;setSync('syncing');
  try{await setDoc(docRef,JSON.parse(JSON.stringify(S)));setSync('ok')}
  catch(e){setSync('err')}
  finally{isSaving=false;if(pendingSave){pendingSave=false;save()}}
}

async function loadFromCloud(){
  try{
    const snap=await getDoc(docRef);
    if(snap.exists()){
      const d=snap.data();
      S={...S,...d};
      if(!Array.isArray(S.cats)||S.cats.length===0)S.cats=[
        {name:'삼남래',tier:'t2',emoji:'🎯'},
        {name:'일정',tier:'evt',emoji:'📅'},
        {name:'개인',tier:'t3',emoji:'🗂'}
      ];
      S.events=S.events||{};
      S.todos=S.todos||{};
      S.recurring=S.recurring||{tasks:[],events:[]};
      S.collapsed=S.collapsed||{};
      S.habits=S.habits||[];
    }else{
      const b=localStorage.getItem('onesys_v2');
      if(b)try{S={...S,...JSON.parse(b)}}catch(e){}
      await setDoc(docRef,S);
    }
  }catch(e){
    const b=localStorage.getItem('onesys_v2');
    if(b)try{S={...S,...JSON.parse(b)}}catch(e){}
    setSync('err');toast('오프라인 모드');
  }
}

function startSync(){
  onSnapshot(docRef,(snap)=>{if(snap.exists()){S={...S,...snap.data()};renderAll()}setSync('ok')},()=>setSync('err'));
}

function carryOver(){
  const today=todayKey();
  if(S.lastCarryDate===today)return;
  const yest=new Date();yest.setDate(yest.getDate()-1);
  const yKey=todayKey(yest);
  const yT=(S.todos||{})[yKey]||[];
  const unfinished=yT.filter(t=>!t.done);
  if(unfinished.length>0){
    if(!S.todos[today])S.todos[today]=[];
    const exists=new Set(S.todos[today].map(t=>t.text));
    const toCarry=unfinished.filter(t=>!exists.has(t.text)).map(t=>({...t,id:uid(),done:false,carried:true,originDate:yKey}));
    if(toCarry.length){
      S.todos[today]=[...toCarry,...S.todos[today]];
      toast(`어제 미완료 ${toCarry.length}개 이월 ↩`);
    }
  }
  S.lastCarryDate=today;
}

function generateRecurring(){
  const today=todayKey();
  if(S.lastRepeatDate===today)return;
  const d=new Date(),dow=d.getDay(),dom=d.getDate();
  (S.recurring.tasks||[]).forEach(r=>{
    const fire=r.type==='daily'||(r.type==='weekly'&&(r.weekdays||[]).includes(dow))||(r.type==='monthly'&&r.day===dom);
    if(!fire)return;
    if(!S.todos[today])S.todos[today]=[];
    if(S.todos[today].some(t=>t.originId===r.id))return;
    S.todos[today].push({id:uid(),text:r.text,done:false,cat:r.cat,originId:r.id,repeat:r.type});
  });
  (S.recurring.events||[]).forEach(r=>{
    const fire=r.type==='daily'||(r.type==='weekly'&&(r.weekdays||[]).includes(dow))||(r.type==='monthly'&&r.day===dom);
    if(!fire)return;
    if(!S.events[today])S.events[today]=[];
    if(S.events[today].some(e=>e.originId===r.id))return;
    S.events[today].push({id:uid(),title:r.title,time:r.time,cat:r.cat,originId:r.id,repeat:r.type});
  });
  S.lastRepeatDate=today;
}

function checkAutoArchive(){
  const today=todayKey(),wk=thisWeekKey(),mk=thisMonthKey();
  if(S.goals.otLastDate!==today){S.goals.otDone=false;S.goals.otLastDate=today}
  if(S.lastWeekKey&&S.lastWeekKey!==wk&&S.goals.weekly){
    const w=calcWeeklyOT();
    if(!S.history)S.history=[];
    S.history.unshift({type:'weekly',period:S.lastWeekKey,goal:S.goals.weekly,otDone:w.done,otTotal:w.total,weeklyAchieved:!!(S.weeklyDoneLog||{})[S.lastWeekKey],archivedAt:today});
    S.goals.weekly='';
    setTimeout(()=>openNewGoalModal('weekly'),600);
  }
  if(!S.lastWeekKey||S.lastWeekKey!==wk)S.lastWeekKey=wk;
  if(S.lastMonthKey&&S.lastMonthKey!==mk&&S.goals.monthly){
    const m=calcMonthlyOT();
    if(!S.history)S.history=[];
    S.history.unshift({type:'monthly',period:S.lastMonthKey,goal:S.goals.monthly,weeksDone:m.done,weeksTotal:m.total,archivedAt:today});
    S.goals.monthly='';
    setTimeout(()=>openNewGoalModal('monthly'),1200);
  }
  if(!S.lastMonthKey||S.lastMonthKey!==mk)S.lastMonthKey=mk;
}

function calcWeeklyOT(){
  const m=weekStart();let done=0;
  for(let i=0;i<7;i++){const d=new Date(m);d.setDate(m.getDate()+i);if((S.otLog||{})[todayKey(d)])done++}
  return{done,total:7}
}
function calcMonthlyOT(){
  const t=new Date(),y=t.getFullYear(),mo=t.getMonth();
  let mondays=[],d=new Date(y,mo,1);
  while(d.getDay()!==1&&d.getMonth()===mo)d.setDate(d.getDate()+1);
  if(d.getMonth()!==mo)d=new Date(y,mo,1);
  while(d.getMonth()===mo){mondays.push(new Date(d));d.setDate(d.getDate()+7)}
  let done=0;
  mondays.forEach(mn=>{if((S.weeklyDoneLog||{})[todayKey(mn)])done++});
  return{done,total:mondays.length||1}
}

function renderContextLine(){
  const el=document.getElementById('context-line');
  const m=S.goals.monthly||'—', w=S.goals.weekly||'—';
  el.innerHTML=`📍 <span style="color:var(--t1);opacity:.85">${escapeHtml(m.length>14?m.slice(0,14)+'…':m)}</span><span class="ctx-arrow">›</span><span style="color:var(--t2);opacity:.85">${escapeHtml(w.length>14?w.slice(0,14)+'…':w)}</span><span class="ctx-arrow">›</span><span class="ctx-here">오늘</span>`;
}

function renderOT(){
  const card=document.getElementById('ot-mega');
  const disp=document.getElementById('ot-disp');
  const acts=document.getElementById('ot-actions');
  const below=document.getElementById('below-ot');
  if(!S.goals.onething){
    card.classList.add('empty');card.classList.remove('checked');
    disp.textContent='오늘의 단 하나를 정해주세요';
    disp.classList.add('ph');
    acts.style.display='none';
    below.classList.add('dim');
  }else{
    card.classList.remove('empty');
    disp.textContent=S.goals.onething;
    disp.classList.remove('ph');
    acts.style.display='flex';
    below.classList.remove('dim');
    if(S.goals.otDone){
      card.classList.add('checked');
      document.getElementById('ot-check-btn').innerHTML='✓ 달성 완료';
    }else{
      card.classList.remove('checked');
      document.getElementById('ot-check-btn').innerHTML='○ 달성';
    }
  }
}

window.focusOT=()=>{
  document.getElementById('ot-disp').style.display='none';
  const i=document.getElementById('ot-inp');
  i.style.display='block';i.value=S.goals.onething||'';i.focus();
  document.getElementById('ot-actions').style.display='none';
};
function saveOT(){
  S.goals.onething=document.getElementById('ot-inp').value.trim();
  document.getElementById('ot-inp').style.display='none';
  document.getElementById('ot-disp').style.display='block';
  save();renderOT();renderContextLine();
}
document.getElementById('ot-inp').addEventListener('blur',saveOT);
document.getElementById('ot-inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveOT()}});

window.openOTModal=()=>{
  if(!S.goals.onething){toast('원씽을 먼저 입력하세요');return}
  const isDone=S.goals.otDone;
  document.getElementById('ot-emoji').textContent=isDone?'↩':'⚡';
  document.getElementById('ot-title').textContent=isDone?'달성을 취소할까요?':'오늘의 원씽 달성?';
  document.getElementById('ot-sub').textContent=isDone?'':'「'+S.goals.onething+'」';
  const yBtn=document.getElementById('ot-yes-btn');
  yBtn.textContent=isDone?'취소':'달성했어요 🎯';
  yBtn.className=isDone?'modal-btn yes-red':'modal-btn yes-gold';
  document.getElementById('ot-no-btn').textContent='아직요';
  document.getElementById('ot-modal').classList.add('open');
};

window.confirmOT=()=>{
  S.goals.otDone=!S.goals.otDone;
  const today=todayKey();
  if(!S.otLog)S.otLog={};
  if(S.goals.otDone)S.otLog[today]=true;else delete S.otLog[today];
  save();closeModal('ot-modal');renderOT();renderStats();renderGoals();
  if(S.goals.otDone){
    setTimeout(()=>{
      document.getElementById('ot-emoji').textContent='🏆';
      document.getElementById('ot-title').textContent='오늘 원씽 클리어!';
      document.getElementById('ot-sub').textContent='이 momentum 계속 가져가세요';
      document.getElementById('ot-yes-btn').style.display='none';
      document.getElementById('ot-no-btn').textContent='닫기';
      document.getElementById('ot-modal').classList.add('open');
      setTimeout(()=>{document.getElementById('ot-yes-btn').style.display=''},500);
    },200);
  }
};

window.focusGoal=(k)=>{
  document.getElementById(k+'-disp').style.display='none';
  const i=document.getElementById(k+'-inp');
  i.style.display='block';i.value=S.goals[k]||'';i.focus();
};
function saveGoalMini(k){
  S.goals[k]=document.getElementById(k+'-inp').value.trim();
  document.getElementById(k+'-inp').style.display='none';
  document.getElementById(k+'-disp').style.display='block';
  save();renderGoals();renderContextLine();
}
['monthly','weekly'].forEach(k=>{
  const i=document.getElementById(k+'-inp');
  i.addEventListener('blur',()=>saveGoalMini(k));
  i.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveGoalMini(k)}});
});

function renderGoals(){
  ['monthly','weekly'].forEach(k=>{
    const d=document.getElementById(k+'-disp');
    if(S.goals[k]){d.textContent=S.goals[k];d.classList.remove('ph')}
    else{d.textContent=k==='monthly'?'이번 달 원씽':'이번 주 원씽';d.classList.add('ph')}
  });
  const w=calcWeeklyOT(),m=calcMonthlyOT();
  document.getElementById('weekly-fill').style.width=Math.round(w.done/7*100)+'%';
  document.getElementById('weekly-meta').textContent=`${w.done}/7일`;
  document.getElementById('monthly-fill').style.width=Math.round(m.done/m.total*100)+'%';
  document.getElementById('monthly-meta').textContent=`${m.done}/${m.total}주`;
  const wk=thisWeekKey();
  document.getElementById('weekly-mini-check').classList.toggle('done',!!(S.weeklyDoneLog||{})[wk]);
}

window.toggleWeeklyGoal=()=>{
  if(!S.goals.weekly){toast('주간 원씽을 먼저 입력하세요');return}
  if(!S.weeklyDoneLog)S.weeklyDoneLog={};
  const wk=thisWeekKey();
  S.weeklyDoneLog[wk]=!S.weeklyDoneLog[wk];
  if(!S.weeklyDoneLog[wk])delete S.weeklyDoneLog[wk];
  save();renderGoals();
  if(S.weeklyDoneLog[wk])toast('이번 주 원씽 달성! 🎯');
};

function renderCategorySections(){
  const today=todayKey();
  const todos=(S.todos||{})[today]||[];
  const events=(S.events||{})[today]||[];
  const sec=document.getElementById('cat-section');
  const grouped={};
  S.cats.forEach(c=>{grouped[c.name]={cat:c,items:[]}});
  const fallback=S.cats[0]?.name;
  todos.forEach(t=>{
    const cn=grouped[t.cat]?t.cat:fallback;
    if(grouped[cn])grouped[cn].items.push({kind:'task',data:t});
  });
  events.forEach(e=>{
    const cn=grouped[e.cat]?e.cat:fallback;
    if(grouped[cn])grouped[cn].items.push({kind:'event',data:e});
  });
  Object.values(grouped).forEach(g=>{
    g.items.sort((a,b)=>{
      const tA=a.kind==='event'?a.data.time:'';
      const tB=b.kind==='event'?b.data.time:'';
      if(tA&&tB)return tA.localeCompare(tB);
      if(tA)return -1;
      if(tB)return 1;
      return (a.data.done?1:0)-(b.data.done?1:0);
    });
  });
  sec.innerHTML=S.cats.map(c=>{
    const g=grouped[c.name];
    const isCol=!!S.collapsed[c.name];
    const itemsCount=g.items.length;
    const doneCount=g.items.filter(i=>i.data.done).length;
    const progPct=itemsCount?Math.round(doneCount/itemsCount*100):0;
    return `<div class="cat-block ${c.tier}${isCol?' collapsed':''}" data-cat="${escapeHtml(c.name)}">
      <div class="cat-head" onclick="toggleCatBlock('${escapeHtml(c.name)}')">
        <div class="cat-dot"></div>
        <div class="cat-head-name">${c.emoji||''} ${escapeHtml(c.name)}</div>
        <div class="cat-head-count">${doneCount}/${itemsCount}</div>
        <div class="cat-arrow">▾</div>
      </div>
      <div class="cat-progress"><div class="cat-progress-fill" style="width:${progPct}%"></div></div>
      <div class="cat-body">
        ${g.items.length===0?'<div class="cat-empty">비어있음</div>':g.items.map(it=>renderItem(it,c)).join('')}
        <div class="add-btn-row">
          <button class="add-mini-btn" onclick="toggleAddForm('${escapeHtml(c.name)}')">+ 추가</button>
          <div class="add-form" id="addform-${escapeHtml(c.name)}">${renderAddForm(c)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderItem(it,cat){
  const t=it.data,kind=it.kind,tierCls=cat.tier;
  const isEvt=kind==='event';
  const time=isEvt?t.time:'';
  const dueBadge=t.due?`<span class="item-badge due">${dueLabel(t.due)}</span>`:'';
  const repBadge=t.repeat?`<span class="item-badge repeat">↻ ${repeatLabel(t.repeat)}</span>`:'';
  const carBadge=t.carried&&!t.done?`<span class="item-badge carried">↩ 이월</span>`:'';
  const done=isEvt?false:t.done;
  return `<div class="item ${tierCls} ${isEvt?'evt':'task'}${done?' done':''}">
    ${time?`<div class="item-time">${time}</div>`:''}
    ${!isEvt?`<div class="item-check" onclick="toggleTask('${t.id}')"><span class="chk">✓</span></div>`:''}
    <div class="item-body" onclick="${isEvt?`editItemPrompt('${t.id}','event')`:`toggleTask('${t.id}')`}">
      <div class="item-text">${escapeHtml(isEvt?t.title:t.text)}</div>
      ${(dueBadge||repBadge||carBadge)?`<div class="item-meta">${dueBadge}${repBadge}${carBadge}</div>`:''}
    </div>
    <div class="item-actions">
      <button class="item-act" onclick="event.stopPropagation();editItemPrompt('${t.id}','${kind}')">✎</button>
      <button class="item-act del" onclick="event.stopPropagation();delItem('${t.id}','${kind}')">×</button>
    </div>
  </div>`;
}

function dueLabel(due){
  const today=todayKey();
  const diff=Math.ceil((new Date(due)-new Date(today))/86400000);
  if(diff<0)return`⚠ ${Math.abs(diff)}일 초과`;
  if(diff===0)return`오늘마감`;
  return`D-${diff}`;
}
function repeatLabel(r){
  if(r==='daily')return'매일';
  if(r==='weekly')return'매주';
  if(r==='monthly')return'매월';
  return r;
}

window.setRep=(cat,type,btn)=>{
  if(!_addState[cat])_addState[cat]={repeat:'none',weekdays:[]};
  _addState[cat].repeat=type;
  _addState[cat].weekdays=type==='weekly'?_addState[cat].weekdays:[];
  document.querySelectorAll(`#af-rep-${cat} .rep-btn`).forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(`af-wd-${cat}`).style.display=type==='weekly'?'flex':'none';
};

window.toggleWD=(cat,i,btn)=>{
  if(!_addState[cat])_addState[cat]={repeat:'weekly',weekdays:[]};
  const arr=_addState[cat].weekdays;
  const at=arr.indexOf(i);
  if(at>=0)arr.splice(at,1);else arr.push(i);
  btn.classList.toggle('on');
};

window.submitAdd=(catName)=>{
  const text=document.getElementById('af-text-'+catName).value.trim();
  const time=document.getElementById('af-time-'+catName).value;
  if(!text){toast('내용을 입력하세요');return}
  const today=todayKey();
  const st=_addState[catName]||{repeat:'none',weekdays:[]};
  const isEvt=!!time;
  if(isEvt){
    if(!S.events[today])S.events[today]=[];
    const e={id:uid(),title:text,time,cat:catName};
    if(st.repeat&&st.repeat!=='none'){
      if(st.repeat==='weekly'&&st.weekdays.length===0){toast('요일을 선택하세요');return}
      e.repeat=st.repeat;
      const rid=uid();e.originId=rid;
      if(!S.recurring.events)S.recurring.events=[];
      S.recurring.events.push({id:rid,title:text,time,cat:catName,type:st.repeat,weekdays:st.weekdays,createdAt:today});
    }
    S.events[today].push(e);
  }else{
    if(!S.todos[today])S.todos[today]=[];
    const t={id:uid(),text,done:false,cat:catName};
    if(st.repeat&&st.repeat!=='none'){
      if(st.repeat==='weekly'&&st.weekdays.length===0){toast('요일을 선택하세요');return}
      t.repeat=st.repeat;
      const rid=uid();t.originId=rid;
      if(!S.recurring.tasks)S.recurring.tasks=[];
      S.recurring.tasks.push({id:rid,text,cat:catName,type:st.repeat,weekdays:st.weekdays,createdAt:today});
    }
    S.todos[today].push(t);
  }
  document.getElementById('af-text-'+catName).value='';
  document.getElementById('af-time-'+catName).value='';
  _addState[catName]={repeat:'none',weekdays:[]};
  save();renderAll();
  toast(isEvt?'일정 추가 ✓':'할 일 추가 ✓');
};

window.toggleAddForm=(catName)=>{

};

window.delItem=(id,kind)=>{

function renderHabitsFooter(){
  const el=document.getElementById('habits-footer');
  const today=todayKey();
  let html=`<div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);letter-spacing:2px;margin-bottom:8px">70-DAY HABITS</div>`;
  if(!S.habits||S.habits.length===0){
    html+=`<button class="habit-add-mini" onclick="addHabitPrompt()">+ 습관 추가</button>`;
    el.innerHTML=html;return;
  }
  html+=S.habits.map((h,i)=>{
    const done=!!((h.records||{})[today]);
    const streak=getStreak(h);
    const dots=Array.from({length:7}).map((_,di)=>{
      const d=new Date();d.setDate(d.getDate()-(6-di));
      const k=todayKey(d);
      const on=(h.records||{})[k];
      return`<div class="hd${on?' on':''}${di===6?' today':''}"></div>`;
    }).join('');
    return`<div class="habit-row">
      <button class="habit-check-mini${done?' done':''}" onclick="toggleHabit(${i})">✓</button>
      <span class="habit-name-mini">${escapeHtml(h.name)}</span>
      <div class="habit-dots-mini">${dots}</div>
      <span class="habit-streak-mini${streak>0?' active':''}">${streak>0?'🔥'+streak:'—'}</span>
      <button class="habit-del-mini" onclick="delHabit(${i})">×</button>
    </div>`;
  }).join('')+`<button class="habit-add-mini" onclick="addHabitPrompt()">+ 습관 추가</button>`;
  el.innerHTML=html;
}

function getStreak(h){
  let s=0;const d=new Date();
  if(!(h.records||{})[todayKey(d)])d.setDate(d.getDate()-1);
  while(true){const k=todayKey(d);if(!(h.records||{})[k])break;s++;d.setDate(d.getDate()-1)}
  return s;
}

window.delCat=(i)=>{

function renderWeekView(){
  const ws=weekStart();ws.setDate(ws.getDate()+wkOffset*7);
  const today=todayKey();
  const hdrs=document.getElementById('wk-day-headers');
  hdrs.innerHTML='<div></div>'+Array.from({length:7}).map((_,i)=>{
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const k=todayKey(d);
    const cls=(k===today?' today':'')+(k===wkSelDay?' sel':'');
    return`<div class="wk-day-h${cls}" onclick="selectWkDay('${k}')"><div class="wd-name">${DAYS[d.getDay()]}</div><div class="wd-num">${d.getDate()}</div></div>`;
  }).join('');
  const grid=document.getElementById('wk-grid');
  let html='<div class="wk-time-col">';
  for(let h=6;h<=23;h++)html+=`<div class="wk-time-cell">${z(h)}:00</div>`;
  html+='</div>';
  for(let i=0;i<7;i++){
    const d=new Date(ws);d.setDate(ws.getDate()+i);
    const k=todayKey(d);
    const isToday=k===today;
    html+=`<div class="wk-day-col${isToday?' today':''}" data-key="${k}">`;
    for(let h=6;h<=23;h++)html+=`<div class="wk-hour-line"></div>`;
    const evs=(S.events||{})[k]||[];
    evs.forEach(e=>{
      if(!e.time)return;
      const [hh,mm]=e.time.split(':').map(Number);
      if(hh<6||hh>23)return;
      const top=((hh-6)*38)+(mm/60*38);
      const cat=S.cats.find(c=>c.name===e.cat);
      const tier=cat?.tier||'evt';
      html+=`<div class="wk-event ${tier==='evt'?'':tier}" style="top:${top}px;height:36px" onclick="editItemPrompt('${e.id}','event')">
        <div class="wk-event-time">${e.time}</div>
        <div class="wk-event-title">${escapeHtml(e.title)}</div>
      </div>`;
    });
    if(isToday){
      const now=new Date(),nh=now.getHours(),nm=now.getMinutes();
      if(nh>=6&&nh<=23){
        const top=((nh-6)*38)+(nm/60*38);
        html+=`<div class="wk-now-line" style="top:${top}px"></div>`;
      }
    }
    html+='</div>';
  }
  grid.innerHTML=html;
  const we=new Date(ws);we.setDate(ws.getDate()+6);
  document.getElementById('wk-title').textContent=`${ws.getMonth()+1}/${ws.getDate()} ~ ${we.getMonth()+1}/${we.getDate()}`;
  if(!wkSelDay)wkSelDay=today;
  renderWkDayTasks();
}

  if(v==='weekly')renderWeekView();
  if(v==='history')renderHistory();
};

window.closeModal=closeModal;

function renderAll(){
  renderContextLine();
  renderOT();
  renderGoals();
  renderStats();
  renderCategorySections();
  renderHabitsFooter();
  if(document.getElementById('view-weekly').classList.contains('on'))renderWeekView();
}

document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});
});

async function init(){
  const d=new Date();
  document.getElementById('hdr-date').textContent=`${d.getFullYear()}.${z(d.getMonth()+1)}.${z(d.getDate())} ${DAYS[d.getDay()]}`;
  setSync('syncing');
  await loadFromCloud();
  checkAutoArchive();
  generateRecurring();
  carryOver();
  await save();
  renderAll();
  startSync();
  document.getElementById('loading-screen').classList.add('hide');
  setInterval(()=>{if(document.getElementById('view-weekly').classList.contains('on'))renderWeekView()},60000);
}

init();
</script>
</body>
</html>
