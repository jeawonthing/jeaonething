<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>ONE THING</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0f;--surf:#13131a;--surf2:#1c1c26;--bord:#2a2a38;--acc:#7c6aff;--acc2:#ff6a6a;--acc3:#6affe0;--txt:#e8e8f0;--txt2:#8888aa;--txt3:#555570;--done:#3a3a50;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* TRACE LINE */
.trace-line-wrap{position:fixed;left:0;top:0;bottom:0;width:3px;z-index:50;pointer-events:none}
.trace-line-bg{position:absolute;inset:0;background:#1a1a2a}
.trace-line-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,var(--acc3),var(--acc));border-radius:2px;transition:height .6s cubic-bezier(.22,.68,0,1.2)}
.trace-score{position:fixed;left:6px;top:50%;transform:translateY(-50%);font-family:'Space Mono',monospace;font-size:8px;color:var(--acc3);writing-mode:vertical-rl;letter-spacing:1px;opacity:.5;pointer-events:none}

.app{max-width:420px;margin:0 auto;padding:0 0 90px}
.hdr{padding:20px 20px 0;display:flex;justify-content:space-between;align-items:center}
.hdr-date{font-family:'Space Mono',monospace;font-size:11px;color:var(--txt3);letter-spacing:1px}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-title{font-size:13px;color:var(--acc);font-weight:700;letter-spacing:2px}
.sync-indicator{width:7px;height:7px;border-radius:50%;background:var(--txt3);transition:background .3s}
.sync-indicator.syncing{background:#ffa500;animation:pulse-sync .8s infinite}
.sync-indicator.ok{background:var(--acc3)}
.sync-indicator.err{background:var(--acc2)}
@keyframes pulse-sync{0%,100%{opacity:1}50%{opacity:.3}}
section{padding:0 16px;margin-top:18px}
.sec-lbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bord)}
.ot-card{background:var(--surf);border:1.5px solid rgba(106,255,224,.35);border-radius:16px;padding:16px;margin-bottom:8px;transition:all .2s}
.ot-card.checked{background:rgba(106,255,224,.07);border-color:rgba(106,255,224,.6)}
.ot-top{display:flex;align-items:center;gap:12px}
.ot-check{width:48px;height:48px;border-radius:13px;border:2px solid rgba(106,255,224,.6);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:rgba(106,255,224,.06)}
.ot-card.checked .ot-check{background:var(--acc3);border-color:var(--acc3)}
.ot-check .ic-unchecked{opacity:.7}
.ot-card.checked .ic-unchecked{display:none}
.ot-check .ic-checked{display:none}
.ot-card.checked .ic-checked{display:block}
.ot-body{flex:1;min-width:0}
.ot-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--acc3);letter-spacing:2px;margin-bottom:4px}
.ot-txt{font-size:15px;font-weight:700;line-height:1.4;color:var(--txt);cursor:pointer}
.ot-txt.ph{color:var(--txt3);font-weight:400;font-size:13px}
.ot-inp{display:none;width:100%;background:var(--surf2);border:1px solid rgba(106,255,224,.3);border-radius:8px;color:var(--txt);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;padding:8px 10px;margin-top:6px;outline:none;resize:none}
.ot-inp:focus{border-color:var(--acc3)}
@keyframes ot-pulse{0%,100%{box-shadow:0 0 0 0 rgba(106,255,224,.15)}50%{box-shadow:0 0 0 8px rgba(106,255,224,0)}}
.ot-card:not(.checked){animation:ot-pulse 3s infinite}
.goal-card{background:var(--surf);border:1px solid var(--bord);border-radius:16px;padding:14px 16px;margin-bottom:8px;position:relative;overflow:hidden}
.goal-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.goal-card.monthly::before{background:var(--acc)}
.goal-card.weekly::before{background:var(--acc2)}
.goal-card-top{display:flex;align-items:flex-start;gap:10px}
.goal-card-body{flex:1;cursor:pointer}
.goal-lbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;margin-bottom:5px}
.goal-card.monthly .goal-lbl{color:var(--acc)}
.goal-card.weekly .goal-lbl{color:var(--acc2)}
.goal-txt{font-size:15px;font-weight:700;line-height:1.4;color:var(--txt)}
.goal-txt.ph{color:var(--txt3);font-weight:400;font-size:13px}
.goal-inp{display:none;width:100%;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;color:var(--txt);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;padding:8px 10px;margin-top:6px;outline:none;resize:none}
.goal-inp:focus{border-color:var(--acc)}
.prog-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.prog-bar{flex:1;height:3px;background:var(--bord);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.goal-card.monthly .prog-fill{background:var(--acc)}
.goal-card.weekly .prog-fill{background:var(--acc2)}
.prog-meta{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);min-width:60px;text-align:right;white-space:nowrap}
.weekly-check{width:36px;height:36px;border-radius:10px;border:2px solid rgba(255,106,106,.4);background:rgba(255,106,106,.08);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.weekly-check.done{background:var(--acc2);border-color:var(--acc2)}
.weekly-check-icon{font-size:16px;color:var(--acc2)}
.weekly-check.done .weekly-check-icon{color:#0a0a0f}
.stats-row{display:flex;gap:6px}
.stat-card{flex:1;background:transparent;border:1px solid #1e1e28;border-radius:10px;padding:9px 6px;text-align:center}
.stat-num{font-family:'Space Mono',monospace;font-size:16px;font-weight:500;line-height:1;color:var(--txt3)}
.stat-lbl{font-size:9px;color:var(--txt3);opacity:.6;margin-top:3px}
.habit-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.habit-item{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:12px;transition:all .2s}
.habit-item.done{border-color:rgba(106,255,224,.35);background:rgba(106,255,224,.05)}
.habit-check-btn{width:46px;height:46px;border-radius:13px;border:2px solid var(--bord);background:var(--surf2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.habit-check-btn .hc-ring{width:16px;height:16px;border-radius:50%;border:2.5px solid var(--txt3)}
.habit-check-btn .hc-done{display:none;color:#0a0a0f;font-size:22px;font-weight:900;line-height:1}
.habit-item.done .habit-check-btn{background:var(--acc3);border-color:var(--acc3)}
.habit-item.done .habit-check-btn .hc-ring{display:none}
.habit-item.done .habit-check-btn .hc-done{display:block}
.habit-body{flex:1;min-width:0}
.habit-name{font-size:14px;font-weight:500}
.habit-item.done .habit-name{color:var(--acc3)}
.habit-meta{display:flex;align-items:center;gap:8px;margin-top:5px}
.habit-streak{font-family:'Space Mono',monospace;font-size:10px;color:var(--txt3)}
.habit-item.done .habit-streak{color:var(--acc3)}
.habit-dots{display:flex;gap:3px}
.hdot{width:7px;height:7px;border-radius:50%;background:var(--bord)}
.hdot.on{background:var(--acc3)}
.hdot.today{border:1.5px solid var(--acc3)}
.hdot.today.on{background:var(--acc3)}
.habit-end{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);margin-top:3px}
.habit-del{background:none;border:none;color:var(--txt3);font-size:16px;cursor:pointer;opacity:0;transition:opacity .15s;padding:0 2px}
.habit-item:hover .habit-del{opacity:1}
.subtle-btn{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid #2a2a3a;border-radius:10px;padding:9px 14px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:400;color:#555570;cursor:pointer;width:100%;transition:all .2s}
.subtle-btn:hover{border-color:#3a3a52;color:#8888aa}
.subtle-btn .arr{margin-left:auto;font-size:10px;transition:transform .2s}
.subtle-btn.open .arr{transform:rotate(180deg)}
.subtle-btn.open{color:#7070a0;border-color:#3a3a52}
.collapsible{display:none;margin-top:6px}
.collapsible.open{display:block}
.habit-form{background:var(--surf2);border:1px solid var(--bord);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.habit-form-row{display:flex;gap:6px;align-items:center}
.habit-form label{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);min-width:36px}
.habit-date-inp{flex:1;background:var(--surf);border:1px solid var(--bord);border-radius:8px;color:var(--txt);font-family:'Space Mono',monospace;font-size:12px;padding:7px 10px;outline:none}
.habit-date-inp:focus{border-color:var(--acc3)}
.cat-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.cat-tag{padding:6px 13px;border-radius:8px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;background:#252535;color:#9090b0}
.cat-tag:hover{background:#2e2e45;color:#c0c0e0}
.cat-tag.on{font-weight:700}
.cat-tag.on.c-all{background:#2a2a3e;color:#e8e8f0}
.cat-tag.on.c-개인{background:#3d2fa0;color:#c8c0ff}
.cat-tag.on.c-유튜브{background:#7a1f1f;color:#ffb0b0}
.cat-tag.on.c-AI{background:#0d4a3a;color:#6affe0}
.cat-tag.on.c-custom{background:#2a2a3e;color:#c0c0d8}
.cat-tag.add-cat{background:transparent;border:1px dashed #3a3a50;color:#555570;font-size:11px}
.cat-tag.add-cat:hover{border-color:var(--acc);color:var(--acc)}
.todo-list{display:flex;flex-direction:column;gap:6px}
.todo-item{background:var(--surf);border:1px solid var(--bord);border-radius:12px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px;transition:all .2s}
.todo-item:active{transform:scale(.98)}
.todo-item.done{opacity:.4;border-color:transparent;background:var(--surf2)}
.todo-item.ot-item{border-color:rgba(124,106,255,.35);background:rgba(124,106,255,.04)}
.todo-item.carried{border-left:2px solid rgba(255,106,106,.4)}
.todo-item.sortable-ghost{opacity:.3;background:var(--surf2)}
.todo-item.sortable-chosen{opacity:.9;box-shadow:0 4px 20px rgba(124,106,255,.2)}
.drag-handle{color:var(--txt3);font-size:13px;cursor:grab;opacity:0;transition:opacity .15s;padding:0 2px;flex-shrink:0;user-select:none;line-height:1;margin-top:2px}
.drag-handle:active{cursor:grabbing}
.todo-item:hover .drag-handle{opacity:.5}
.todo-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--bord);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;cursor:pointer}
.todo-item.done .todo-check{background:var(--done);border-color:var(--done)}
.todo-item.ot-item .todo-check{border-color:var(--acc)}
.chkmark{display:none;color:var(--txt2);font-size:11px;font-weight:700}
.todo-item.done .chkmark{display:block}
.todo-body{flex:1;min-width:0;cursor:pointer}
.todo-meta-row{display:flex;align-items:center;gap:4px;margin-bottom:3px;flex-wrap:wrap}
.todo-cat-badge{font-size:9px;padding:2px 7px;border-radius:6px;font-family:'Space Mono',monospace;background:#252535;color:#9090b0}
.todo-cat-badge.개인{background:rgba(100,80,220,.2);color:#b0a8ff}
.todo-cat-badge.유튜브{background:rgba(220,80,80,.2);color:#ffaaaa}
.todo-cat-badge.AI{background:rgba(50,180,140,.15);color:#6affe0}
.todo-cat-badge.custom{background:rgba(120,120,160,.15);color:#b0b0cc}
.carried-badge{font-size:9px;color:var(--acc2);font-family:'Space Mono',monospace;opacity:.7}
/* 마감 기한 배지 */
.due-badge{font-size:9px;padding:2px 7px;border-radius:6px;font-family:'Space Mono',monospace;background:rgba(255,106,106,.12);color:var(--acc2);border:1px solid rgba(255,106,106,.2)}
.due-badge.today{background:rgba(255,106,106,.25);color:#ff8080;border-color:rgba(255,106,106,.4)}
.due-badge.overdue{background:rgba(255,50,50,.2);color:#ff5555;border-color:rgba(255,50,50,.4);font-weight:700}
.due-badge.soon{background:rgba(255,165,0,.12);color:#ffa500;border-color:rgba(255,165,0,.3)}
/* 연결성 점수 */
.align-score{font-family:'Space Mono',monospace;font-size:9px;color:var(--acc3);opacity:.8;margin-left:auto;flex-shrink:0}
.align-reason{font-size:10px;color:var(--txt3);margin-top:3px;line-height:1.4;font-style:italic}
.todo-rank{font-family:'Space Mono',monospace;font-size:9px}
.todo-rank.r1{color:var(--acc2)}.todo-rank.r2{color:var(--acc)}.todo-rank.r3{color:var(--txt3)}
.todo-txt{font-size:14px;font-weight:500;line-height:1.4}
.todo-item.done .todo-txt{text-decoration:line-through;color:var(--txt3)}
.ot-badge{font-size:9px;color:var(--acc);font-family:'Space Mono',monospace;margin-top:2px;display:none}
.todo-item.ot-item .ot-badge{display:block}
.todo-actions{display:flex;flex-direction:column;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}
.todo-item:hover .todo-actions{opacity:1}
.todo-edit-btn,.todo-del{background:none;border:none;color:var(--txt3);font-size:13px;cursor:pointer;padding:2px 3px;line-height:1}
.todo-edit-btn:hover{color:var(--acc)}
.todo-del:hover{color:var(--acc2)}
.todo-edit-inp{width:100%;background:var(--surf2);border:1px solid var(--acc);border-radius:6px;color:var(--txt);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:500;padding:5px 8px;outline:none;margin-top:3px;resize:none}
/* 커스텀 달력 팝업 */
.cal-popup-overlay{position:fixed;inset:0;z-index:998;background:transparent}
.cal-popup{position:absolute;background:#1a1a2e;border:1px solid #38384f;border-radius:14px;padding:14px;width:260px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-title{font-family:'Space Mono',monospace;font-size:12px;color:var(--txt);font-weight:700}
.cal-nav{background:none;border:none;color:var(--txt2);font-size:16px;cursor:pointer;padding:2px 8px;border-radius:6px;line-height:1}
.cal-nav:hover{background:var(--surf2);color:var(--txt)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day-lbl{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);text-align:center;padding:4px 0}
.cal-day{font-size:12px;text-align:center;padding:5px 2px;border-radius:6px;cursor:pointer;color:var(--txt2);border:none;background:none;line-height:1}
.cal-day:hover{background:var(--surf2);color:var(--txt)}
.cal-day.today{color:var(--acc3);font-weight:700}
.cal-day.selected{background:var(--acc2);color:#fff;font-weight:700}
.cal-day.other-month{color:var(--txt3);opacity:.4}
.cal-day.past{opacity:.3;cursor:default}
.cal-selected-display{font-family:'Space Mono',monospace;font-size:10px;color:var(--acc2);margin-top:8px;text-align:center;min-height:16px}
.cal-clear{display:block;width:100%;margin-top:6px;padding:6px;background:transparent;border:1px solid var(--bord);border-radius:8px;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:var(--txt3);cursor:pointer}
.cal-clear:hover{border-color:var(--acc2);color:var(--acc2)}
.due-inp-wrap{display:flex;align-items:center;gap:6px;margin-top:5px}
.due-inp{background:var(--surf2);border:1px solid var(--bord);border-radius:6px;color:var(--txt3);font-family:'Space Mono',monospace;font-size:10px;padding:3px 7px;outline:none;cursor:pointer}
.due-inp:focus{border-color:var(--acc2);color:var(--txt)}
.due-clear{background:none;border:none;color:var(--txt3);font-size:11px;cursor:pointer;padding:0 2px}
/* 마감일 입력 모드 탭 */
.due-mode-row{display:flex;gap:4px;margin-bottom:4px}
.due-mode-btn{padding:3px 10px;border-radius:6px;border:1px solid var(--bord);background:transparent;font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);cursor:pointer;transition:all .15s}
.due-mode-btn.active{background:rgba(255,106,106,.15);border-color:var(--acc2);color:var(--acc2)}
.due-manual-wrap{display:flex;gap:4px;align-items:center}
.due-month-inp,.due-day-inp{background:var(--surf);border:1px solid var(--bord);border-radius:6px;color:var(--txt);font-family:'Space Mono',monospace;font-size:12px;padding:5px 8px;outline:none;text-align:center}
.due-month-inp{width:50px}
.due-month-inp:focus,.due-day-inp:focus{border-color:var(--acc2)}
.due-day-inp{width:44px}
.due-sep{color:var(--txt3);font-size:12px}
.due-year-fixed{font-family:'Space Mono',monospace;font-size:11px;color:var(--txt3);padding:5px 4px}
.ai-sort-btn{display:flex;align-items:center;gap:6px;background:transparent;border:1px solid #2a2a3a;border-radius:8px;padding:8px 12px;font-family:'Noto Sans KR',sans-serif;font-size:11px;color:#444460;cursor:pointer;transition:all .2s;width:100%;justify-content:center}
.ai-sort-btn:hover{border-color:#3a3a55;color:#7070a0}
.ai-sort-btn.loading{color:var(--acc);border-color:var(--acc)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .7s linear infinite}
.gap6{height:6px}
.add-row{display:flex;gap:6px;margin-top:8px}
.add-inp{flex:1;background:var(--surf);border:1px solid var(--bord);border-radius:10px;color:var(--txt);font-family:'Noto Sans KR',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s}
.add-inp:focus{border-color:var(--acc)}.add-inp::placeholder{color:var(--txt3)}
.add-btn{background:var(--acc);border:none;border-radius:10px;color:#fff;width:40px;font-size:20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.add-btn:active{transform:scale(.9)}
/* 할 일 추가 폼 */
.todo-add-form{background:var(--surf2);border:1px solid var(--bord);border-radius:12px;padding:10px 12px;margin-top:6px;display:flex;flex-direction:column;gap:8px}
.todo-add-row{display:flex;gap:6px;align-items:center}
.todo-add-row label{font-family:'Space Mono',monospace;font-size:9px;color:var(--txt3);min-width:30px}
.todo-due-inp{flex:1;background:var(--surf);border:1px solid var(--bord);border-radius:8px;color:var(--txt);font-family:'Space Mono',monospace;font-size:12px;padding:7px 10px;outline:none}
.todo-due-inp:focus{border-color:var(--acc2)}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.97);border-top:1px solid var(--bord);backdrop-filter:blur(12px);display:flex;justify-content:space-around;padding:10px 0 20px}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:4px 14px;color:var(--txt3);transition:color .15s}
.nav-btn.active{color:var(--acc)}
.nav-icon{font-size:16px}.nav-lbl{font-size:9px;font-family:'Space Mono',monospace}
.view{display:none}.view.on{display:block}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:14px}
.day-cell{background:var(--surf);border:1px solid var(--bord);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all .2s}
.day-cell.today{border-color:var(--acc)}.day-cell.sel{background:var(--acc);border-color:var(--acc)}
.day-cell.sel .day-n,.day-cell.sel .day-d{color:#fff}
.day-d{font-size:9px;color:var(--txt3);font-family:'Space Mono',monospace}.day-n{font-size:14px;font-weight:700;margin-top:2px}
.day-dot{width:3px;height:3px;border-radius:50%;background:var(--acc2);margin:3px auto 0;opacity:0}
.day-cell.has-t .day-dot{opacity:1}

.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(8px);background:#1c1c2e;border:1px solid var(--acc);color:var(--txt);padding:9px 18px;border-radius:99px;font-size:12px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:1000}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAMDtShcAR0j6RyNxZCb0UNAligpQFHb0A",
  authDomain: "jaeonething.firebaseapp.com",
  projectId: "jaeonething",
  storageBucket: "jaeonething.firebasestorage.app",
  messagingSenderId: "214001610486",
  appId: "1:214001610486:web:05b60184be1133e1a886d7"
};

// ── Gemini API Key (LocalStorage 저장 방식) ──
let GEMINI_API_KEY = localStorage.getItem('GEMINI_KEY') || '';
if(!GEMINI_API_KEY){
  GEMINI_API_KEY = prompt('Gemini API 키를 입력하세요\n(한 번 입력하면 이 기기에 저장됩니다)') || '';
  if(GEMINI_API_KEY) localStorage.setItem('GEMINI_KEY', GEMINI_API_KEY);
}
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

// ── 사용자 페르소나 (AI 정렬 컨텍스트) ──
const USER_PERSONA = `사용자: 유튜버 최재원 (삼남래 팀 리더)
2026년 연간 목표: 유튜브 또는 틱톡 어워즈 수상
핵심 가치:
- [Viral & Identity] 수상을 위한 압도적 조회수와 대체 불가능한 캐릭터 구축
- [Future Asset] 미래 커머스 확장에 유리한 신뢰와 매력을 캐릭터에 내재화
- [Retention] 알고리즘 선택을 받기 위한 시청 지속시간 극대화`;

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const docRef = doc(db, 'onething', 'jaewon');

const DAYS=['일','월','화','수','목','금','토'];
let S = {
  goals:{monthly:'',weekly:'',onething:'',otDone:false,otLastDate:''},
  todos:{},habits:[],otLog:{},weeklyDoneLog:{},
  history:[],categories:['개인','유튜브','AI'],
  lastWeekKey:'',lastMonthKey:'',lastCarryDate:''
};
let selDay=todayKey(),pendingHabitIdx=null,selectedCat=null,addCat='개인',newGoalType='';
let isSaving=false,pendingSave=false;

function setSyncStatus(s){const d=document.getElementById('sync-dot');d.className='sync-indicator '+s;}

async function save(){
  // 로컬 백업 — 타임스탬프 포함
  try{localStorage.setItem('onesys_backup',JSON.stringify({...S,_localTs:Date.now()}));}catch(e){}
  if(isSaving){pendingSave=true;return;}
  isSaving=true;setSyncStatus('syncing');
  try{
    await setDoc(docRef,JSON.parse(JSON.stringify(S)));
    setSyncStatus('ok');
  }catch(e){setSyncStatus('err');}
  finally{isSaving=false;if(pendingSave){pendingSave=false;save();}}
}

function startSync(){
  onSnapshot(docRef,(snap)=>{
    if(snap.exists()){S={...S,...snap.data()};renderAll();}
    setSyncStatus('ok');
  },(e)=>setSyncStatus('err'));
}

async function loadFromFirestore(){
  try{
    const snap=await getDoc(docRef);
    if(snap.exists()){
      S={...S,...snap.data()};
    } else {
      // Firebase에 없으면 로컬 백업 확인 후 업로드
      const b=localStorage.getItem('onesys_backup');
      if(b){const local=JSON.parse(b);delete local._localTs;S={...S,...local};}
      await setDoc(docRef,S);
    }
  }catch(e){
    // 오프라인 — 로컬 백업 사용 (Firebase가 진실 공급원이므로 임시)
    const b=localStorage.getItem('onesys_backup');
    if(b){const local=JSON.parse(b);delete local._localTs;S={...S,...local};}
    setSyncStatus('err');
    toast('오프라인 모드 — 로컬 데이터를 사용합니다');
  }
}

function todayKey(){const d=new Date();return`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`}
function z(n){return String(n).padStart(2,'0')}
function yesterdayKey(){const d=new Date();d.setDate(d.getDate()-1);return`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`}
function thisWeekKey(){const t=new Date(),dow=t.getDay(),m=new Date(t);m.setDate(t.getDate()-(dow===0?6:dow-1));return`${m.getFullYear()}-${z(m.getMonth()+1)}-${z(m.getDate())}`}
function thisMonthKey(){const d=new Date();return`${d.getFullYear()}-${z(d.getMonth()+1)}`}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function toggleCollapse(btnId,wrapId){const b=document.getElementById(btnId),w=document.getElementById(wrapId);b.classList.toggle('open');w.classList.toggle('open');}

// ── 마감일 표시 ──
function getDueBadge(due){
  if(!due)return'';
  const today=todayKey();
  const diff=Math.ceil((new Date(due)-new Date(today))/(1000*60*60*24));
  if(diff<0)return`<span class="due-badge overdue">⚠ ${Math.abs(diff)}일 초과</span>`;
  if(diff===0)return`<span class="due-badge today">오늘 마감</span>`;
  if(diff<=2)return`<span class="due-badge soon">D-${diff}</span>`;
  return`<span class="due-badge">D-${diff}</span>`;
}

// ── Trace Line 업데이트 ──
function updateTraceLine(){
  const todos=(S.todos||{})[todayKey()]||[];
  const doneTodos=todos.filter(t=>t.done);
  const totalScore=doneTodos.reduce((sum,t)=>sum+(t.alignScore||0),0);
  const maxScore=doneTodos.length*5;
  const pct=maxScore>0?Math.min((totalScore/maxScore)*100,100):0;
  document.getElementById('trace-fill').style.height=pct+'%';
  const scoreEl=document.getElementById('trace-score');
  if(totalScore>0){
    scoreEl.textContent=`${totalScore}pt`;
    scoreEl.style.opacity='0.6';
  } else {
    scoreEl.style.opacity='0';
  }
}

// ── 미완료 이월 ──
function carryOverTodos(){
  const today=todayKey(),yesterday=yesterdayKey();
  if((S.lastCarryDate||'')===today)return;
  const yTodos=(S.todos||{})[yesterday]||[];
  const unfinished=yTodos.filter(t=>!t.done);
  if(unfinished.length===0){S.lastCarryDate=today;return;}
  if(!S.todos)S.todos={};if(!S.todos[today])S.todos[today]=[];
  const todayTexts=new Set(S.todos[today].map(t=>t.text));
  const toCarry=unfinished.filter(t=>!todayTexts.has(t.text));
  if(toCarry.length>0){
    const carried=toCarry.map(t=>({...t,done:false,rank:null,carried:true}));
    S.todos[today]=[...carried,...S.todos[today]];
    toast(`어제 미완료 ${toCarry.length}개 이월됐어요 ↩`);
  }
  S.lastCarryDate=today;save();
}

function calcWeeklyOT(){
  const today=new Date(),dow=today.getDay(),mon=new Date(today);
  mon.setDate(today.getDate()-(dow===0?6:dow-1));
  let done=0;
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);const k=`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;if((S.otLog||{})[k])done++;}
  return{done,total:7};
}
function calcMonthlyOT(){
  const today=new Date(),year=today.getFullYear(),month=today.getMonth(),firstDay=new Date(year,month,1);
  let mondays=[],d=new Date(firstDay);
  while(d.getDay()!==1)d.setDate(d.getDate()+1);
  while(d.getMonth()===month){mondays.push(new Date(d));d.setDate(d.getDate()+7);}
  if(firstDay.getDay()!==1)mondays.unshift(firstDay);
  let total=0,done=0;
  mondays.forEach(m=>{total++;const wk=`${m.getFullYear()}-${z(m.getMonth()+1)}-${z(m.getDate())}`;if((S.weeklyDoneLog||{})[wk])done++;});
  return{done,total};
}

function updateProgress(){
  const w=calcWeeklyOT(),m=calcMonthlyOT();
  const wpct=Math.round(w.done/w.total*100),mpct=m.total>0?Math.round(m.done/m.total*100):0;
  document.getElementById('weekly-prog').style.width=wpct+'%';
  document.getElementById('weekly-meta').textContent=`${w.done}/7일 (${wpct}%)`;
  document.getElementById('monthly-prog').style.width=mpct+'%';
  document.getElementById('monthly-meta').textContent=`${m.done}/${m.total}주 (${mpct}%)`;
  const wk=thisWeekKey(),btn=document.getElementById('weekly-check-btn');
  if((S.weeklyDoneLog||{})[wk]){btn.className='weekly-check done';btn.querySelector('.weekly-check-icon').textContent='✓';}
  else{btn.className='weekly-check';btn.querySelector('.weekly-check-icon').textContent='○';}
  const todos=(S.todos||{})[todayKey()]||[],done2=todos.filter(t=>t.done).length,total2=todos.length;
  document.getElementById('s-done').textContent=done2;
  document.getElementById('s-left').textContent=total2-done2;

}

function renderCalPopup(){
  const title=document.getElementById('cal-title');

  const grid=document.getElementById('cal-grid');
  const dayLabels=['일','월','화','수','목','금','토'];
  let html=dayLabels.map(d=>`<div class="cal-day-lbl">${d}</div>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const today=todayKey();
  // 이전달 빈칸
  for(let i=0;i<firstDay;i++){
    const prevDays=new Date(calYear,calMonth,0).getDate();
    html+=`<button class="cal-day other-month" disabled>${prevDays-firstDay+i+1}</button>`;
  }
  for(let d=1;d<=daysInMonth;d++){
    const k=`${calYear}-${z(calMonth+1)}-${z(d)}`;

    html+=`<button class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="calSelectDay('${k}')">${d}</button>`;

      <span class="drag-handle">⠿</span>
      <div class="todo-check" onclick="toggleTodo('${key}',${ri})"><span class="chkmark">✓</span></div>
      <div class="todo-body" onclick="toggleTodo('${key}',${ri})">
        <div class="todo-meta-row">
          ${t.cat?`<span class="todo-cat-badge ${getCatCls(t.cat)}">${t.cat}</span>`:''}
          ${t.carried&&!t.done?`<span class="carried-badge">↩ 이월</span>`:''}
          ${rankLabel?`<span class="todo-rank ${rankClass}">${rankLabel}</span>`:''}
          ${getDueBadge(t.due)}
          ${t.alignScore!=null?`<span class="align-score" style="color:${scoreColor}">★${t.alignScore}</span>`:''}
        </div>
        <div class="todo-txt">${t.text}</div>
        ${t.alignReason&&!t.done?`<div class="align-reason">${t.alignReason}</div>`:''}
        ${isOT?'<div class="ot-badge">⚡ 원씽 연관</div>':''}
      </div>
      <div class="todo-actions">
        <button class="todo-edit-btn" onclick="startEditTodo('${key}',${ri},this.closest('.todo-item'))">✎</button>
        <button class="todo-edit-btn" style="color:var(--acc2);opacity:${t.done?'0':'inherit'}" onclick="editDue('${key}',${ri},this.closest('.todo-item'))" title="마감일 수정">📅</button>
        <button class="todo-del" onclick="event.stopPropagation();delTodo('${key}',${ri})">×</button>
      </div>
    </div>`;
  }).join('');

  if(window.Sortable&&!selectedCat){
    Sortable.create(list,{
      animation:150,handle:'.drag-handle',
      ghostClass:'sortable-ghost',chosenClass:'sortable-chosen',
      onEnd(evt){
        const full=S.todos[key]||[];
        const moved=full.splice(evt.oldIndex,1)[0];
        full.splice(evt.newIndex,0,moved);
        S.todos[key]=full;save();renderTodos(key);
      }
    });
  }
  updateProgress();renderWeekGrid();
}

// ── Gemini AI 정렬 (아이젠하워 매트릭스 기반) ──
async function aiSort(){
  const key=todayKey(),todos=(S.todos||{})[key]||[],undone=todos.filter(t=>!t.done);
  if(undone.length<2){toast('할 일이 2개 이상 필요해요');return;}
  const btn=document.getElementById('sort-btn');
  btn.innerHTML='<span class="spin">⟳</span> Gemini 분석 중...';
  btn.classList.add('loading');btn.disabled=true;

  const prompt=`${USER_PERSONA}

동적 목표 (앱에서 실시간 입력됨):
- 연간/월간 원씽: ${S.goals.monthly||'미설정'}
- 주간 원씽: ${S.goals.weekly||'미설정'}
- 오늘의 원씽: ${S.goals.onething||'미설정'}

오늘의 할 일 목록:
${undone.map((t,i)=>`${i+1}. [${t.cat||'없음'}] ${t.text}${t.due?' (마감:'+t.due+')':''}`).join('\n')}

아이젠하워 매트릭스 기반으로 정렬하라.
2사분면(중요하지만 급하지 않은 기획/창작/분석 업무)을 최우선으로 배치하라.
중요도(1~5)는 위 핵심 가치 및 목표와의 연결성 기준으로 산정하라.

다음 JSON만 반환하라. JSON 외 어떠한 설명, 마크다운, 텍스트도 절대 포함하지 마라. 오직 JSON만:
{"sorted":[{"index":0,"rank":1,"alignScore":5,"alignReason":"한줄근거"}]}
rank: 1=긴급/중요, 2=중요/여유, 3=긴급/덜중요, 4=낮은우선순위
alignScore: 1~5 (목표 연결성)
[중요] 반드시 순수 JSON만 반환하라. 설명 문구, 코드블록, 마크다운 기호 일절 금지.`;

  try{
    const res=await fetch(GEMINI_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}],
        safetySettings:[
          {category:"HARM_CATEGORY_HARASSMENT",threshold:"BLOCK_NONE"},
          {category:"HARM_CATEGORY_HATE_SPEECH",threshold:"BLOCK_NONE"}
        ],
        generationConfig:{temperature:0.2}
      })
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();
    const raw=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const start=raw.indexOf('{'),end=raw.lastIndexOf('}');
    if(start===-1||end===-1||start>=end){
      toast('AI 응답 형식이 올바르지 않습니다. 다시 시도해 주세요.');
      throw new Error('JSON not found in response');
    }
    const clean=raw.substring(start,end+1);
    let parsed;
    try{parsed=JSON.parse(clean);}
    catch(parseErr){toast('AI 응답 형식이 올바르지 않습니다. 다시 시도해 주세요.');throw parseErr;}
    const undoneIdx=todos.reduce((a,t,i)=>{if(!t.done)a.push(i);return a;},[]);
    const sorted=parsed.sorted.map(s=>({
      ...todos[undoneIdx[s.index]],
      rank:s.rank,
      alignScore:s.alignScore!=null?Math.min(5,Math.max(1,Math.round(s.alignScore))):null,
      alignReason:s.alignReason||''
    }));
    S.todos[key]=[...sorted,...todos.filter(t=>t.done)];
    save();renderTodos(key);toast('AI 정렬 완료 ✦');
  }catch(e){
    console.error(e);
    if(!e.message.includes('JSON'))toast(`Gemini 오류: ${e.message}`);
  }
  btn.innerHTML='✦ AI 중요도 정렬 (Gemini)';
  btn.classList.remove('loading');btn.disabled=false;
}

function renderWeekGrid(){
  const grid=document.getElementById('week-grid'),today=new Date(),tk=todayKey(),dow=today.getDay(),mon=new Date(today);
  mon.setDate(today.getDate()-(dow===0?6:dow-1));
  grid.innerHTML=Array.from({length:7}).map((_,i)=>{
    const d=new Date(mon);d.setDate(mon.getDate()+i);
    const k=`${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}`;
    return`<div class="day-cell${k===tk?' today':''}${k===selDay?' sel':''}${((S.todos||{})[k]||[]).length>0?' has-t':''}" onclick="selectDay('${k}','${DAYS[d.getDay()]}','${d.getDate()}')"><div class="day-d">${DAYS[d.getDay()]}</div><div class="day-n">${d.getDate()}</div><div class="day-dot"></div></div>`;
  }).join('');
}
function selectDay(key,dn,dd){selDay=key;document.getElementById('sel-day-lbl').textContent=`${dd}일 (${dn})`;renderWeekGrid();renderWeekTodos(key);}
function renderWeekTodos(key){
  const list=document.getElementById('week-todo-list'),todos=(S.todos||{})[key]||[];
  list.innerHTML=todos.length===0?'<div class="empty">이날은 비어있어요</div>':todos.map((t,i)=>`
    <div class="todo-item${t.done?' done':''}${t.carried&&!t.done?' carried':''}" onclick="toggleTodo('${key}',${i})">
      <div class="todo-check"><span class="chkmark">✓</span></div>
      <div class="todo-body">
        ${t.cat||t.due?`<div class="todo-meta-row">${t.cat?`<span class="todo-cat-badge ${getCatCls(t.cat)}">${t.cat}</span>`:''} ${getDueBadge(t.due)}</div>`:''}
        <div class="todo-txt">${t.text}</div>
      </div>
      <button class="todo-del" onclick="event.stopPropagation();delTodo('${key}',${i})">×</button>
    </div>`).join('');
  renderWeekGrid();
}
function addWeekTodo(){
  const inp=document.getElementById('week-inp'),txt=inp.value.trim();if(!txt)return;
  if(!S.todos)S.todos={};if(!S.todos[selDay])S.todos[selDay]=[];
  S.todos[selDay].push({text:txt,done:false,rank:null,cat:addCat,due:null});
  save();inp.value='';renderWeekTodos(selDay);renderWeekGrid();toast('추가됨');
}
function renderHistory(){
  const list=document.getElementById('history-list');
  if(!S.history||S.history.length===0){list.innerHTML='<div class="empty">아직 기록이 없어요<br>주/월이 바뀌면 자동으로 저장돼요</div>';return;}
  list.innerHTML=S.history.map(h=>{
    const isW=h.type==='weekly',achieved=isW?h.weeklyAchieved:(h.weeksDone===h.weeksTotal&&h.weeksTotal>0);
    const stat=isW?`원씽 ${h.otDone}/${h.otTotal}일 달성`:`주간 원씽 ${h.weeksDone}/${h.weeksTotal}주 달성`;
    return`<div class="history-item"><div class="history-period"><span>${h.period}</span><span class="history-badge ${achieved?'yes':'no'}">${achieved?'달성 ✓':'미달성'}</span></div><div class="history-type ${h.type}">${isW?'WEEKLY 원씽':'MONTHLY 원씽'}</div><div class="history-goal">${h.goal}</div><div class="history-stat">${stat}</div></div>`;
  }).join('');
}

function sw(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('on');
  document.getElementById('nav-'+v).classList.add('active');
  if(v==='weekly'){renderWeekGrid();selectDay(selDay,DAYS[new Date().getDay()],new Date().getDate());}
  if(v==='history')renderHistory();
}

function renderAll(){
  renderGoals();renderOT();renderTodos(todayKey());renderHabits();renderCatTags();renderWeekGrid();
  selectDay(todayKey(),DAYS[new Date().getDay()],new Date().getDate());
}

document.querySelectorAll('.modal-overlay').forEach(el=>{el.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});});
document.getElementById('habit-date-inp').value=todayKey();

async function init(){
  const d=new Date();
  document.getElementById('hdr-date').textContent=`${d.getFullYear()}.${z(d.getMonth()+1)}.${z(d.getDate())} ${DAYS[d.getDay()]}`;
  setSyncStatus('syncing');
  await loadFromFirestore();
  checkAutoArchive();
  carryOverTodos();
  renderAll();
  startSync();
  document.getElementById('loading-screen').classList.add('hide');
}
